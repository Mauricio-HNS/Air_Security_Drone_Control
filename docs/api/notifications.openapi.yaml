openapi: 3.0.3
info:
  title: Air Security Drone Control Notifications API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }
  /api/notifications/send:
    post:
      summary: Send notification message
      responses:
        '202': { description: Accepted }
  /api/notifications:
    get:
      summary: List notifications
      responses:
        '200': { description: OK }
