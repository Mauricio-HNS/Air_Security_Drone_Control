openapi: 3.0.3
info:
  title: Air Security Drone Control Notifications API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Chequeo de salud
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Metricas basicas de solicitudes
      responses:
        '200': { description: OK }
  /api/notifications/send:
    post:
      summary: Enviar notificacion
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '202': { description: Aceptado }
  /api/notifications:
    get:
      summary: Listar notificaciones
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
