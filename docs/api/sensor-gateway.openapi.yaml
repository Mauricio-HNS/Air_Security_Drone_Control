openapi: 3.0.3
info:
  title: Air Security Drone Control Sensor Gateway API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Chequeo de salud
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Metricas basicas de solicitudes
      responses:
        '200': { description: OK }
  /api/sensors/detections:
    post:
      summary: Ingerir evento de deteccion
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDetectionRequest'
      responses:
        '201':
          description: Creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionEvent'
        '401': { description: No autorizado }
        '403': { description: Prohibido }
    get:
      summary: Listar ultimas detecciones
      responses:
        '200': { description: OK }
  /api/sensors/status:
    get:
      summary: Listar estado de nodos sensor
      responses:
        '200': { description: OK }
  /api/sensors/status/{sensorNodeId}:
    get:
      summary: Obtener estado de nodo sensor por id
      parameters:
        - in: path
          name: sensorNodeId
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '404': { description: No encontrado }
components:
  schemas:
    DroneType:
      type: string
      enum: [Unknown, Quadcopter, Hexacopter, Octocopter, FixedWing, Vtol, Fpv, Nano, HeavyLift]
    CreateDetectionRequest:
      type: object
      required: [sensorNodeId, sensorType, classification, latitude, longitude, confidence]
      properties:
        sensorNodeId: { type: string }
        sensorType: { type: string }
        classification: { type: string }
        latitude: { type: number, format: double }
        longitude: { type: number, format: double }
        altitudeMeters: { type: number, format: double, nullable: true }
        confidence: { type: number, format: double }
        headingDegrees: { type: number, format: double, nullable: true }
        speedMps: { type: number, format: double, nullable: true }
        droneType:
          allOf:
            - $ref: '#/components/schemas/DroneType'
          nullable: true
    DetectionEvent:
      type: object
      properties:
        detectionId: { type: string, format: uuid }
        sensorNodeId: { type: string }
        sensorType: { type: string }
        classification: { type: string }
        position: { type: object }
        timestampUtc: { type: string, format: date-time }
        confidence: { type: number, format: double }
        headingDegrees: { type: number, format: double, nullable: true }
        speedMps: { type: number, format: double, nullable: true }
        droneType:
          allOf:
            - $ref: '#/components/schemas/DroneType'
          nullable: true
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
