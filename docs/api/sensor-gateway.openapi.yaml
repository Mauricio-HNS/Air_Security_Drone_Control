openapi: 3.0.3
info:
  title: Air Security Drone Control Sensor Gateway API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Chequeo de salud
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Metricas basicas de solicitudes
      responses:
        '200': { description: OK }
  /api/sensors/detections:
    post:
      summary: Ingerir evento de deteccion
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '201': { description: Creado }
        '401': { description: No autorizado }
        '403': { description: Prohibido }
    get:
      summary: Listar ultimas detecciones
      responses:
        '200': { description: OK }
  /api/sensors/status:
    get:
      summary: Listar estado de nodos sensor
      responses:
        '200': { description: OK }
  /api/sensors/status/{sensorNodeId}:
    get:
      summary: Obtener estado de nodo sensor por id
      parameters:
        - in: path
          name: sensorNodeId
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '404': { description: No encontrado }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
