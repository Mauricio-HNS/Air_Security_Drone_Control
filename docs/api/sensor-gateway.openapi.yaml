openapi: 3.0.3
info:
  title: Air Security Drone Control Sensor Gateway API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Basic request metrics
      responses:
        '200': { description: OK }
  /api/sensors/detections:
    post:
      summary: Ingest detection event
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '201': { description: Created }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
    get:
      summary: List latest detections
      responses:
        '200': { description: OK }
  /api/sensors/status:
    get:
      summary: List sensor node status
      responses:
        '200': { description: OK }
  /api/sensors/status/{sensorNodeId}:
    get:
      summary: Get sensor node status by id
      parameters:
        - in: path
          name: sensorNodeId
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '404': { description: Not found }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
