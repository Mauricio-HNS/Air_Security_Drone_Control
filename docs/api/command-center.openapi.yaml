openapi: 3.0.3
info:
  title: Air Security Drone Control Command Center API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Chequeo de salud
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Metricas basicas de solicitudes
      responses:
        '200': { description: OK }
  /api/projections/tracks:
    post:
      summary: Proyectar trayectoria
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '202': { description: Aceptado }
  /api/projections/threats:
    post:
      summary: Proyectar amenaza
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '202': { description: Aceptado }
  /api/projections/incidents:
    post:
      summary: Proyectar incidente
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '202': { description: Aceptado }
  /api/projections/sensors:
    post:
      summary: Proyectar estado del sensor
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '202': { description: Aceptado }
  /api/overview:
    get:
      summary: Instantanea de overview
      responses:
        '200': { description: OK }
  /api/tracks:
    get:
      summary: Listar trayectorias
      responses:
        '200': { description: OK }
  /api/incidents:
    get:
      summary: Listar incidentes
      responses:
        '200': { description: OK }
  /api/sensors/status:
    get:
      summary: Listar sensores
      responses:
        '200': { description: OK }
  /api/replay/{incidentId}:
    get:
      summary: Replay de incidente
      parameters:
        - in: path
          name: incidentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
        '404': { description: No encontrado }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
