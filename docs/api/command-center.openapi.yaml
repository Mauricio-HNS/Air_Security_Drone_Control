openapi: 3.0.3
info:
  title: Air Security Drone Control Command Center API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }
  /api/projections/tracks:
    post:
      summary: Project fused track to command center read model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FusedTrack'
      responses:
        '202':
          description: Projection accepted
  /api/projections/threats:
    post:
      summary: Project threat assessment to command center read model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreatAssessment'
      responses:
        '202':
          description: Projection accepted
  /api/projections/incidents:
    post:
      summary: Project incident case to command center read model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentCase'
      responses:
        '202':
          description: Projection accepted
  /api/projections/sensors:
    post:
      summary: Project sensor node status to command center read model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SensorNodeStatus'
      responses:
        '202':
          description: Projection accepted
  /api/tracks:
    get:
      summary: List tracks for tactical view
      responses:
        '200':
          description: Tracks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FusedTrack'
  /api/incidents:
    get:
      summary: List incidents for tactical view
      responses:
        '200':
          description: Incidents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IncidentCase'
  /api/sensors/status:
    get:
      summary: List sensor status for tactical view
      responses:
        '200':
          description: Sensor status list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SensorNodeStatus'
  /api/replay/{incidentId}:
    get:
      summary: Get replay timeline for incident
      parameters:
        - in: path
          name: incidentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Replay payload
        '404':
          description: Incident not found
  /api/overview:
    get:
      summary: Get tactical overview for dashboard
      responses:
        '200':
          description: Tactical snapshot
components:
  schemas:
    GeoPoint:
      type: object
      properties:
        latitude: { type: number, format: double }
        longitude: { type: number, format: double }
        altitudeMeters: { type: number, format: double, nullable: true }
    FusedTrack:
      type: object
      properties:
        trackId: { type: string, format: uuid }
        detectionIds:
          type: array
          items: { type: string, format: uuid }
        estimatedPosition: { $ref: '#/components/schemas/GeoPoint' }
        estimatedSpeedMps: { type: number, format: double }
        estimatedHeadingDegrees: { type: number, format: double }
        confidence: { type: number, format: double }
        lastUpdateUtc: { type: string, format: date-time }
    ThreatAssessment:
      type: object
      properties:
        assessmentId: { type: string, format: uuid }
        trackId: { type: string, format: uuid }
        score: { type: number, format: double }
        level:
          type: string
          enum: [Low, Medium, High, Critical]
        summary: { type: string }
        timestampUtc: { type: string, format: date-time }
    IncidentCase:
      type: object
      properties:
        incidentId: { type: string, format: uuid }
        trackId: { type: string, format: uuid }
        threatAssessmentId: { type: string, format: uuid }
        status:
          type: string
          enum: [Open, UnderInvestigation, Resolved, Dismissed]
        zone: { type: string }
        createdAtUtc: { type: string, format: date-time }
        closedAtUtc: { type: string, format: date-time, nullable: true }
    SensorNodeStatus:
      type: object
      properties:
        sensorNodeId: { type: string }
        sensorType:
          type: string
          enum: [Camera, Acoustic, Rf, Radar, ExternalApi, AdsB, AuthorizedTelemetry]
        health:
          type: string
          enum: [Online, Warning, Offline]
        lastSeenUtc: { type: string, format: date-time }
        signalQuality: { type: number, format: double }
