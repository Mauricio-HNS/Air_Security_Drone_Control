openapi: 3.0.3
info:
  title: Air Security Drone Control Command Center API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Basic request metrics
      responses:
        '200': { description: OK }
  /api/projections/tracks:
    post:
      summary: Project track
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '202': { description: Accepted }
  /api/projections/threats:
    post:
      summary: Project threat
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '202': { description: Accepted }
  /api/projections/incidents:
    post:
      summary: Project incident
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '202': { description: Accepted }
  /api/projections/sensors:
    post:
      summary: Project sensor status
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '202': { description: Accepted }
  /api/overview:
    get:
      summary: Overview snapshot
      responses:
        '200': { description: OK }
  /api/tracks:
    get:
      summary: List tracks
      responses:
        '200': { description: OK }
  /api/incidents:
    get:
      summary: List incidents
      responses:
        '200': { description: OK }
  /api/sensors/status:
    get:
      summary: List sensors
      responses:
        '200': { description: OK }
  /api/replay/{incidentId}:
    get:
      summary: Incident replay
      parameters:
        - in: path
          name: incidentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
        '404': { description: Not found }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
