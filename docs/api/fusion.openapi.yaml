openapi: 3.0.3
info:
  title: Air Security Drone Control Fusion API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Basic request metrics
      responses:
        '200': { description: OK }
  /api/fusion/fuse:
    post:
      summary: Fuse detection events into a track
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
  /api/fusion/tracks:
    get:
      summary: List tracks
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
