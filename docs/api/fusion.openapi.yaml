openapi: 3.0.3
info:
  title: Air Security Drone Control Fusion API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Chequeo de salud
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Metricas basicas de solicitudes
      responses:
        '200': { description: OK }
  /api/fusion/fuse:
    post:
      summary: Fusionar eventos de deteccion en una trayectoria
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FuseDetectionsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FusedTrack'
        '401': { description: No autorizado }
        '403': { description: Prohibido }
  /api/fusion/tracks:
    get:
      summary: Listar trayectorias
      responses:
        '200': { description: OK }
components:
  schemas:
    DroneType:
      type: string
      enum: [Unknown, Quadcopter, Hexacopter, Octocopter, FixedWing, Vtol, Fpv, Nano, HeavyLift]
    DetectionEvent:
      type: object
      properties:
        detectionId: { type: string, format: uuid }
        classification: { type: string }
        confidence: { type: number, format: double }
        speedMps: { type: number, format: double, nullable: true }
        headingDegrees: { type: number, format: double, nullable: true }
        position:
          type: object
          properties:
            latitude: { type: number, format: double }
            longitude: { type: number, format: double }
            altitudeMeters: { type: number, format: double, nullable: true }
        droneType:
          allOf:
            - $ref: '#/components/schemas/DroneType'
          nullable: true
    FuseDetectionsRequest:
      type: object
      required: [detections]
      properties:
        detections:
          type: array
          items:
            $ref: '#/components/schemas/DetectionEvent'
    FusedTrack:
      type: object
      properties:
        trackId: { type: string, format: uuid }
        detectionIds:
          type: array
          items: { type: string, format: uuid }
        estimatedPosition: { type: object }
        estimatedSpeedMps: { type: number, format: double }
        estimatedHeadingDegrees: { type: number, format: double }
        confidence: { type: number, format: double }
        lastUpdateUtc: { type: string, format: date-time }
        droneType:
          allOf:
            - $ref: '#/components/schemas/DroneType'
          nullable: true
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
