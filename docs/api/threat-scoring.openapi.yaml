openapi: 3.0.3
info:
  title: Air Security Drone Control Threat Scoring API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Chequeo de salud
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Metricas basicas de solicitudes
      responses:
        '200': { description: OK }
  /api/threat/assess:
    post:
      summary: Calcular evaluacion de amenaza
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '200': { description: OK }
        '401': { description: No autorizado }
        '403': { description: Prohibido }
  /api/threat/assessments:
    get:
      summary: Listar evaluaciones
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
