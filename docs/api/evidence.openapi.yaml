openapi: 3.0.3
info:
  title: Air Security Drone Control Evidence API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Chequeo de salud
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Metricas basicas de solicitudes
      responses:
        '200': { description: OK }
  /api/evidence:
    post:
      summary: Guardar evidencia con hash de integridad
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '201': { description: Creado }
    get:
      summary: Listar evidencias
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
