openapi: 3.0.3
info:
  title: Air Security Drone Control Incidents API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Basic request metrics
      responses:
        '200': { description: OK }
  /api/incidents/open:
    post:
      summary: Open incident
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '201': { description: Created }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
  /api/incidents/{incidentId}/status:
    patch:
      summary: Update incident status
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      parameters:
        - in: path
          name: incidentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /api/incidents:
    get:
      summary: List incidents
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
