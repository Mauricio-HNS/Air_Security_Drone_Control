openapi: 3.0.3
info:
  title: Air Security Drone Control Incidents API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Chequeo de salud
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Metricas basicas de solicitudes
      responses:
        '200': { description: OK }
  /api/incidents/open:
    post:
      summary: Abrir incidente
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '201': { description: Creado }
        '401': { description: No autorizado }
        '403': { description: Prohibido }
  /api/incidents/{incidentId}/status:
    patch:
      summary: Actualizar estado del incidente
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      parameters:
        - in: path
          name: incidentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /api/incidents:
    get:
      summary: Listar incidentes
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
