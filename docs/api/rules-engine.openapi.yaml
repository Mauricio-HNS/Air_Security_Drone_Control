openapi: 3.0.3
info:
  title: Air Security Drone Control Rules Engine API
  version: 0.2.0
paths:
  /health:
    get:
      summary: Chequeo de salud
      responses:
        '200': { description: OK }
  /metrics/basic:
    get:
      summary: Metricas basicas de solicitudes
      responses:
        '200': { description: OK }
  /api/rules:
    post:
      summary: Crear politica de regla (admin)
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '201': { description: Creado }
    get:
      summary: Listar politicas de reglas
      responses:
        '200': { description: OK }
  /api/rules/simulate:
    post:
      summary: Simular decision de regla
      security:
        - ApiKeyAuth: []
          RoleHeader: []
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    RoleHeader:
      type: apiKey
      in: header
      name: X-Role
